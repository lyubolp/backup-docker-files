version: '3.8'
services:
  cove:
    image: cove:latest
    container_name: cove
    restart: unless-stopped
    ports:
      - "8000:8000"
    labels:
      - "bdf.enable=true"
      - "bdf.extraction_type=sqlite"
      - "bdf.online=true"
      - "bdf.file_path=/app/database.db"

  weight-tracker:
    image: weight-tracker:latest
    container_name: weight-tracker
    restart: unless-stopped
    ports:
      - "8501:8501"
    labels:
      - "bdf.enable=true"
      - "bdf.extraction_type=file"
      - "bdf.online=true"
      - "bdf.file_path=/app/db.json"

  pocketbase-demo:
    build: pocketbase-demo
    container_name: pocketbase-demo
    restart: unless-stopped
    ports:
    - "8090:8090"
    labels:
      - "bdf.enable=true"
      - "bdf.extraction_type=pocketbase"
      - "bdf.online=true"